<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>에어컨 설치 견적 계산기</title>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800;900&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #1B3A6B;
      --primary-mid: #254d8f;
      --primary-light: #e8eef8;
      --accent: #2563eb;
      --bg: #f0f4fa;
      --card: #ffffff;
      --border: #c9d8ee;
      --text: #1a2640;
      --sub: #5a7099;
      --white: #ffffff;
      --card-shadow: 0 4px 24px rgba(27,58,107,0.10);
    }

    body {
      font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      color: var(--text);
    }

    header {
      background: linear-gradient(135deg, #1B3A6B 0%, #2563eb 100%);
      color: white;
      padding: 36px 20px 28px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 180px; height: 180px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
    }
    header::after {
      content: '';
      position: absolute;
      bottom: -30px; left: -20px;
      width: 120px; height: 120px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
    }
    header h1 {
      font-size: 1.6rem;
      font-weight: 900;
      letter-spacing: -0.5px;
      position: relative;
    }
    header p {
      margin-top: 8px;
      font-size: 0.88rem;
      opacity: 0.88;
      position: relative;
    }

    .container {
      max-width: 560px;
      margin: 0 auto;
      padding: 24px 16px 60px;
    }

    .step-card {
      background: var(--card);
      border-radius: 20px;
      box-shadow: var(--card-shadow);
      padding: 24px;
      margin-bottom: 14px;
      border: 1.5px solid var(--border);
      transition: border-color 0.2s, transform 0.2s;
      animation: fadeUp 0.3s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .step-label {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .step-num {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: white;
      border-radius: 50%;
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.82rem;
      font-weight: 800;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(27,58,107,0.25);
    }
    .step-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
    }

    .options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .options.cols-1 { grid-template-columns: 1fr; }
    .options.cols-3 { grid-template-columns: 1fr 1fr 1fr; }

    .opt-btn {
      border: 1.5px solid var(--border);
      background: #f5f8ff;
      border-radius: 14px;
      padding: 14px 10px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      transition: all 0.18s;
      text-align: center;
      line-height: 1.5;
    }
    .opt-btn:hover {
      border-color: var(--accent);
      background: var(--primary-light);
      transform: translateY(-2px);
    }
    .opt-btn.selected {
      border-color: var(--primary);
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: white;
      font-weight: 700;
      box-shadow: 0 4px 16px rgba(27,58,107,0.25);
    }

    .desc-box {
      margin-top: 12px;
      background: #e8eef8;
      border: 1px solid #b8cce8;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.82rem;
      color: var(--primary);
      font-weight: 600;
      display: none;
    }
    .desc-box.show { display: block; }

    /* 추가비용 */
    .extra-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0;
      border-bottom: 1px solid #eaf0f8;
      gap: 12px;
    }
    .extra-item:last-child { border-bottom: none; }
    .extra-label { font-size: 0.9rem; font-weight: 600; flex: 1; }
    .extra-label small { display: block; color: var(--sub); font-size: 0.78rem; margin-top: 3px; }

    .extra-controls { display: flex; align-items: center; gap: 8px; }
    .cnt-btn {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 1.5px solid #b8cce8;
      background: var(--primary-light);
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--primary);
      transition: all 0.15s;
    }
    .cnt-btn:hover { background: var(--primary); color: white; border-color: var(--primary); }
    .cnt-val { font-size: 1rem; font-weight: 800; min-width: 22px; text-align: center; color: var(--primary); }

    .toggle-btn {
      width: 48px; height: 26px;
      border-radius: 13px;
      border: none;
      background: #d0ddf0;
      cursor: pointer;
      position: relative;
      transition: background 0.25s;
    }
    .toggle-btn::after {
      content: '';
      position: absolute;
      top: 3px; left: 3px;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: white;
      transition: left 0.25s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
    .toggle-btn.on { background: linear-gradient(135deg, var(--primary), var(--accent)); }
    .toggle-btn.on::after { left: 25px; }

    /* 견적 결과 */
    .result-card {
      background: linear-gradient(135deg, #1B3A6B 0%, #2563eb 100%);
      border-radius: 20px;
      padding: 28px 24px;
      color: white;
      margin-top: 8px;
      box-shadow: 0 8px 32px rgba(27,58,107,0.25);
      animation: fadeUp 0.3s ease both;
    }
    .result-title { font-size: 0.88rem; opacity: 0.88; margin-bottom: 6px; font-weight: 500; }
    .result-total { font-size: 2.4rem; font-weight: 900; letter-spacing: -1.5px; }
    .result-total span { font-size: 1rem; font-weight: 500; opacity: 0.85; }
    .result-breakdown {
      margin-top: 20px;
      background: rgba(0,0,0,0.15);
      border-radius: 12px;
      padding: 16px;
      backdrop-filter: blur(4px);
    }
    .breakdown-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      padding: 5px 0;
      opacity: 0.92;
    }
    .breakdown-row.total-row {
      border-top: 1px solid rgba(255,255,255,0.25);
      margin-top: 10px;
      padding-top: 12px;
      font-weight: 800;
      font-size: 1rem;
      opacity: 1;
    }

    .notice {
      margin-top: 16px;
      background: rgba(0,0,0,0.12);
      border-radius: 10px;
      padding: 12px;
      font-size: 0.78rem;
      line-height: 1.7;
      opacity: 0.88;
    }

    .reset-btn {
      display: block;
      width: 100%;
      margin-top: 14px;
      padding: 15px;
      border-radius: 14px;
      border: 1.5px solid #b8cce8;
      background: white;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--primary);
      cursor: pointer;
      transition: all 0.18s;
      letter-spacing: 0.2px;
    }
    .reset-btn:hover { background: var(--primary); color: white; border-color: var(--primary); }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<header>
  <h1>❄️ 에어컨 설치 견적 계산기</h1>
  <p>항목을 선택하시면 예상 견적을 바로 확인할 수 있어요</p>
</header>

<div class="container">

  <!-- 1단계 -->
  <div class="step-card active" id="step1">
    <div class="step-label">
      <div class="step-num">1</div>
      <div class="step-title">설치 유형 선택</div>
    </div>
    <div class="options cols-1">
      <button class="opt-btn" onclick="select1('이전설치')">이전설치<br><small style="font-weight:400;font-size:0.78rem;opacity:0.7">기존 에어컨을 다른 장소로 이동</small></button>
      <button class="opt-btn" onclick="select1('재설치')">재설치<br><small style="font-weight:400;font-size:0.78rem;opacity:0.7">기존 장소에 다시 설치</small></button>
    </div>
  </div>

  <!-- 2단계 -->
  <div class="step-card hidden" id="step2">
    <div class="step-label">
      <div class="step-num">2</div>
      <div class="step-title">에어컨 종류 선택</div>
    </div>
    <div class="options cols-1" id="type-options">
      <button class="opt-btn" onclick="select2('벽걸이')">벽걸이 <span style="font-weight:400;opacity:0.75;font-size:0.82rem">160,000원</span><br><small style="font-weight:400;font-size:0.75rem;opacity:0.6">(기본설치비 배관5m+가스충전+타공1회)</small></button>
      <button class="opt-btn" onclick="select2('스탠드')">스탠드 <span style="font-weight:400;opacity:0.75;font-size:0.82rem">190,000원</span><br><small style="font-weight:400;font-size:0.75rem;opacity:0.6">(기본설치비 배관5m+가스충전+타공1회)</small></button>
      <button class="opt-btn" onclick="select2('투인원')">투인원 <span style="font-weight:400;opacity:0.75;font-size:0.82rem">310,000원</span><br><small style="font-weight:400;font-size:0.75rem;opacity:0.6">(기본설치비 벽걸이5m+스탠드5m+가스충전+타공2회)</small></button>
      <button class="opt-btn" onclick="select2('냉난방벽걸이')">냉난방 벽걸이 <span style="font-weight:400;opacity:0.75;font-size:0.82rem">별도문의</span></button>
      <button class="opt-btn" onclick="select2('냉난방스탠드')">냉난방 스탠드 <span style="font-weight:400;opacity:0.75;font-size:0.82rem">별도문의</span></button>
    </div>
  </div>

  <!-- 3단계 -->
  <div class="step-card hidden" id="step3">
    <div class="step-label">
      <div class="step-num">3</div>
      <div class="step-title">제조사 선택</div>
    </div>
    <div class="options cols-3">
      <button class="opt-btn" onclick="select3('LG')">LG</button>
      <button class="opt-btn" onclick="select3('삼성')">삼성</button>
      <button class="opt-btn" onclick="select3('캐리어')">캐리어</button>
      <button class="opt-btn" onclick="select3('위니아')">위니아</button>
      <button class="opt-btn" onclick="select3('기타')">기타</button>
    </div>
    <div class="desc-box" id="smartlink-desc">
      🔧 <strong>스마트링크 (+40,000원)</strong> — 삼성 전용 배관연결부속이 추가됩니다.
    </div>
  </div>

  <!-- 4단계 -->
  <div class="step-card hidden" id="step4">
    <div class="step-label">
      <div class="step-num">4</div>
      <div class="step-title">추가 옵션 선택</div>
    </div>

    <!-- 배관 추가 -->
    <div class="extra-item">
      <div class="extra-label">
        배관 추가
        <small id="pipe-price-label">1m당 15,000원</small>
      </div>
      <div class="extra-controls">
        <button class="cnt-btn" onclick="changePipe(-1)">−</button>
        <div class="cnt-val" id="pipe-cnt">0</div>
        <button class="cnt-btn" onclick="changePipe(1)">+</button>
        <span style="font-size:0.8rem;color:var(--sub)">m</span>
      </div>
    </div>

    <!-- 실외기 앵글 -->
    <div class="extra-item">
      <div class="extra-label">
        실외기 앵글
        <small id="angle-price-label">벽걸이용 100,000원</small>
      </div>
      <div class="extra-controls">
        <button class="toggle-btn" id="angle-toggle" onclick="toggleExtra('angle')"></button>
      </div>
    </div>

    <!-- 배수펌프 -->
    <div class="extra-item">
      <div class="extra-label">
        배수펌프
        <small>100,000원</small>
      </div>
      <div class="extra-controls">
        <button class="toggle-btn" id="pump-toggle" onclick="toggleExtra('pump')"></button>
      </div>
    </div>
  </div>

  <!-- 견적 결과 -->
  <div class="result-card hidden" id="result">
    <div class="result-title">예상 견적 금액</div>
    <div class="result-total" id="total-price">0 <span>원</span></div>
    <div class="result-breakdown" id="breakdown"></div>
    <div class="notice">
      ※ 위 금액은 예상 견적이며, 현장 상황에 따라 변동될 수 있습니다.<br>
      정확한 견적은 방문 후 안내드립니다.
    </div>
  </div>

  <button class="reset-btn hidden" id="reset-btn" onclick="resetAll()">🔄 다시 계산하기</button>

</div>

<script>
  // 상태
  const state = {
    step1: null,   // 이전설치 / 재설치
    step2: null,   // 에어컨 종류
    step2Price: 0,
    step3: null,   // 제조사
    pipeCnt: 0,
    angle: false,
    pump: false,
  };

  // ▶ 기본 요금표
  const BASE_PRICE = {
    '이전설치': {
      '벽걸이': 160000,
      '스탠드': 190000,
      '투인원': 310000,
      '냉난방벽걸이': null,
      '냉난방스탠드': null,
    },
    '재설치': {
      '벽걸이': 160000,
      '스탠드': 190000,
      '투인원': 310000,
      '냉난방벽걸이': null,
      '냉난방스탠드': null,
    }
  };

  const PIPE_PRICE = { '벽걸이': 15000, '냉난방벽걸이': 15000, '스탠드': 18000, '투인원': 18000, '냉난방스탠드': 18000 };
  const ANGLE_PRICE = { '벽걸이': 100000, '냉난방벽걸이': 100000, '스탠드': 120000, '투인원': 120000, '냉난방스탠드': 120000 };
  const SMARTLINK = 40000;
  const PUMP = 100000;

  function select1(val) {
    state.step1 = val;
    highlightBtn('step1', val);
    show('step2');
    hide('step3'); hide('step4'); hide('result'); hide('reset-btn');
    state.step2 = null; state.step3 = null;
    clearSelected('step2'); clearSelected('step3');
    document.getElementById('smartlink-desc').classList.remove('show');
  }

  function select2(val) {
    state.step2 = val;
    const price = BASE_PRICE[state.step1][val];
    state.step2Price = price;
    state.isInquiry = (price === null);
    highlightBtn('step2', val);
    hide('step4'); hide('result'); hide('reset-btn');
    state.step3 = null;
    clearSelected('step3');
    document.getElementById('smartlink-desc').classList.remove('show');
    // 배관 단가 라벨 업데이트
    document.getElementById('pipe-price-label').textContent = `1m당 ${(PIPE_PRICE[val] || 15000).toLocaleString()}원`;
    // 앵글 라벨
    const isWall = val === '벽걸이' || val === '냉난방벽걸이';
    document.getElementById('angle-price-label').textContent = isWall ? '벽걸이용 100,000원' : '스탠드/투인원용 120,000원';

    if (state.isInquiry) {
      // 별도문의 제품은 3단계 건너뛰고 바로 안내
      hide('step3');
      show('result');
      show('reset-btn');
      document.getElementById('total-price').innerHTML = '별도 문의 <span>필요</span>';
      document.getElementById('breakdown').innerHTML = `
        <div class="breakdown-row"><span>${val}</span><span>별도 견적</span></div>
        <div class="breakdown-row" style="margin-top:8px;opacity:0.85;font-size:0.8rem;">
          <span>📞 냉난방 제품은 현장 확인 후 정확한 견적을 안내드립니다.</span>
        </div>`;
    } else {
      show('step3');
    }
  }

  function select3(val) {
    state.step3 = val;
    highlightBtn('step3', val);
    // 삼성 스마트링크
    const desc = document.getElementById('smartlink-desc');
    if (val === '삼성') desc.classList.add('show');
    else desc.classList.remove('show');
    // 4단계 초기화
    state.pipeCnt = 0; state.angle = false; state.pump = false;
    document.getElementById('pipe-cnt').textContent = '0';
    document.getElementById('angle-toggle').className = 'toggle-btn';
    document.getElementById('pump-toggle').className = 'toggle-btn';
    show('step4');
    show('result');
    show('reset-btn');
    updateResult();
  }

  function changePipe(d) {
    state.pipeCnt = Math.max(0, state.pipeCnt + d);
    document.getElementById('pipe-cnt').textContent = state.pipeCnt;
    updateResult();
  }

  function toggleExtra(key) {
    state[key] = !state[key];
    document.getElementById(key + '-toggle').className = 'toggle-btn' + (state[key] ? ' on' : '');
    updateResult();
  }

  function updateResult() {
    if (state.isInquiry) return; // 별도문의는 별도 처리
    const items = [];
    let total = 0;
    const base = BASE_PRICE[state.step1][state.step2];
    items.push({ label: `기본 설치비 (${state.step1} · ${state.step2})`, price: base });
    total += base;

    if (state.step3 === '삼성') {
      items.push({ label: '스마트링크 (삼성 전용)', price: SMARTLINK });
      total += SMARTLINK;
    }
    if (state.pipeCnt > 0) {
      const pp = PIPE_PRICE[state.step2] * state.pipeCnt;
      items.push({ label: `배관 추가 ${state.pipeCnt}m`, price: pp });
      total += pp;
    }
    if (state.angle) {
      const ap = ANGLE_PRICE[state.step2];
      items.push({ label: '실외기 앵글', price: ap });
      total += ap;
    }
    if (state.pump) {
      items.push({ label: '배수펌프', price: PUMP });
      total += PUMP;
    }

    document.getElementById('total-price').innerHTML = total.toLocaleString() + ' <span>원</span>';
    let html = '';
    items.forEach(i => {
      html += `<div class="breakdown-row"><span>${i.label}</span><span>${i.price.toLocaleString()}원</span></div>`;
    });
    html += `<div class="breakdown-row total-row"><span>합계</span><span>${total.toLocaleString()}원</span></div>`;
    document.getElementById('breakdown').innerHTML = html;
  }

  function resetAll() {
    state.step1 = null; state.step2 = null; state.step3 = null;
    state.pipeCnt = 0; state.angle = false; state.pump = false; state.isInquiry = false;
    ['step2','step3','step4','result','reset-btn'].forEach(hide);
    clearSelected('step1'); clearSelected('step2'); clearSelected('step3');
    document.getElementById('smartlink-desc').classList.remove('show');
  }

  function show(id) { document.getElementById(id).classList.remove('hidden'); }
  function hide(id) { document.getElementById(id).classList.add('hidden'); }

  function highlightBtn(stepId, val) {
    const btns = document.querySelectorAll(`#${stepId} .opt-btn`);
    btns.forEach(b => {
      b.classList.toggle('selected', b.textContent.trim().replace(/\s+/g,' ').startsWith(val.replace(/\s+/g,' ')));
    });
  }
  function clearSelected(stepId) {
    document.querySelectorAll(`#${stepId} .opt-btn`).forEach(b => b.classList.remove('selected'));
  }
</script>
</body>
</html>
